services:
  api:
    build: .
    env_file: .env.example
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - mlflow

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.2
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlruns
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
